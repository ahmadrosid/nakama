<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LLM Cassette Viewer</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
    }

    body {
      font: 14px/1.5 system-ui, sans-serif;
      color: #111;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    header {
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid #ddd;
      background: #fff;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1rem;
      align-items: center;
      flex-shrink: 0;
    }

    h1 {
      margin: 0;
      font-size: 1.05rem;
      margin-right: 0.25rem;
    }

    .sub, .muted { color: #666; font-size: 0.9rem; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      flex: 1;
    }

    select {
      min-width: 220px;
      max-width: min(420px, 100%);
      flex: 1;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 4px;
      padding: 0.35rem 0.5rem;
      font: inherit;
    }

    button, label.file-btn {
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 4px;
      padding: 0.35rem 0.65rem;
      font: inherit;
      cursor: pointer;
    }

    input[type="file"] { display: none; }

    main {
      flex: 1;
      width: 100%;
      padding: 1rem 1.5rem 2rem;
      box-sizing: border-box;
      overflow: auto;
    }

    main.drag-over {
      outline: 2px dashed #111;
      outline-offset: -8px;
      background: #f0f0f0;
    }

    #view {
      width: 100%;
      max-width: none;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.25rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      color: #444;
    }

    .meta b { color: #111; font-weight: 600; }

    h2 {
      margin: 1.25rem 0 0.5rem;
      font-size: 0.95rem;
    }

    pre {
      margin: 0;
      padding: 0.75rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      white-space: pre-wrap;
      word-break: break-word;
      font: 12px/1.45 ui-monospace, monospace;
      overflow: auto;
    }

    .fn {
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }

    .fn-head {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #eee;
      font: 13px ui-monospace, monospace;
      background: #f5f5f5;
    }

    .fn-head strong { font-weight: 600; }

    .fn-id {
      float: right;
      color: #888;
      font-size: 11px;
    }

    .fn-body { padding: 0.75rem; }

    .kv {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 0.35rem 0.75rem;
      margin-bottom: 0.65rem;
      font-size: 0.9rem;
    }

    .kv:last-child { margin-bottom: 0; }

    .kv .k {
      font: 12px ui-monospace, monospace;
      color: #555;
      padding-top: 0.1rem;
    }

    .kv .v { min-width: 0; }

    .list {
      display: grid;
      gap: 0.5rem;
    }

    .item {
      border: 1px solid #eee;
      border-radius: 4px;
      padding: 0.55rem 0.65rem;
      background: #fcfcfc;
    }

    .item-index {
      font: 11px ui-monospace, monospace;
      color: #888;
      margin-bottom: 0.35rem;
    }

    details { margin-top: 0.5rem; }
    details summary {
      cursor: pointer;
      color: #666;
      font-size: 0.85rem;
    }

    .msg {
      border: 1px solid #eee;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      overflow: hidden;
      background: #fff;
    }

    .msg-role {
      padding: 0.3rem 0.65rem;
      font: 11px ui-monospace, monospace;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #666;
      background: #f5f5f5;
      border-bottom: 1px solid #eee;
    }

    .msg-role.user { background: #eef6ff; color: #1e40af; }
    .msg-role.assistant { background: #f5f5f5; }
    .msg-role.system { background: #f7f7f7; color: #888; }
    .msg-role.tool { background: #f3faf4; color: #166534; }

    .msg-body { padding: 0.55rem 0.65rem; }

    .error { color: #a00; }
    .empty { color: #666; padding: 1.5rem 0; }
  </style>
</head>
<body>
  <header>
    <h1>Cassette Viewer</h1>
    <div class="controls">
      <select id="cassette" aria-label="Cassette">
        <option value="">Select cassette…</option>
      </select>
      <label class="file-btn">
        Open…
        <input id="file" type="file" accept="application/json,.json" multiple />
      </label>
      <button type="button" id="reload">Reload</button>
      <span class="sub" id="status"></span>
    </div>
  </header>

  <main id="main">
    <article id="view">
      <p class="empty">Select a cassette. You can also drop a .json file here.</p>
    </article>
  </main>

  <script>
    const cache = new Map();
    const selectEl = document.getElementById("cassette");
    const viewEl = document.getElementById("view");
    const mainEl = document.getElementById("main");
    const statusEl = document.getElementById("status");

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function pretty(value) {
      try {
        return JSON.stringify(value, null, 2);
      } catch {
        return String(value);
      }
    }

    function parseArgs(raw) {
      if (raw == null) return {};
      if (typeof raw === "object") return raw;
      try {
        return JSON.parse(raw);
      } catch {
        return { _raw: String(raw) };
      }
    }

    function isPlainObject(value) {
      return value != null && typeof value === "object" && !Array.isArray(value);
    }

    function renderScalar(value) {
      if (value === null || value === undefined) {
        return `<span class="muted">${value === null ? "null" : "undefined"}</span>`;
      }
      if (typeof value === "boolean" || typeof value === "number") {
        return `<code>${esc(String(value))}</code>`;
      }
      if (typeof value === "string") {
        if (!value) return `<span class="muted">(empty)</span>`;
        if (value.includes("\n") || value.length > 80) {
          return `<pre>${esc(value)}</pre>`;
        }
        return `<code>${esc(value)}</code>`;
      }
      return `<pre>${esc(pretty(value))}</pre>`;
    }

    function renderObject(value) {
      const entries = Object.entries(value);
      if (!entries.length) return `<span class="muted">(empty object)</span>`;
      return entries
        .map(
          ([key, child]) => `
            <div class="kv">
              <div class="k">${esc(key)}</div>
              <div class="v">${renderValue(child)}</div>
            </div>`,
        )
        .join("");
    }

    function renderArray(value) {
      if (!value.length) return `<span class="muted">(empty array)</span>`;

      const allScalar = value.every(
        (item) =>
          item === null ||
          ["string", "number", "boolean"].includes(typeof item),
      );

      if (allScalar) {
        return `<div class="list">${value
          .map((item) => `<div class="item">${renderScalar(item)}</div>`)
          .join("")}</div>`;
      }

      return `<div class="list">${value
        .map((item, index) => {
          const body = isPlainObject(item)
            ? renderObject(item)
            : Array.isArray(item)
              ? renderArray(item)
              : renderScalar(item);
          return `
            <div class="item">
              <div class="item-index">[${index}]</div>
              ${body}
            </div>`;
        })
        .join("")}</div>`;
    }

    function renderValue(value) {
      if (Array.isArray(value)) return renderArray(value);
      if (isPlainObject(value)) return renderObject(value);
      return renderScalar(value);
    }

    function renderFunctionCall(call) {
      const fn = call.function ?? {};
      const name = fn.name ?? call.name ?? "unknown";
      const args = parseArgs(fn.arguments ?? call.arguments);

      return `
        <div class="fn">
          <div class="fn-head">
            <span class="fn-id">${esc(call.id ?? "")}</span>
            <strong>${esc(name)}</strong>()
          </div>
          <div class="fn-body">
            ${Object.keys(args).length ? renderObject(args) : `<span class="muted">No arguments</span>`}
            <details>
              <summary>Raw args</summary>
              <pre>${esc(pretty(args))}</pre>
            </details>
          </div>
        </div>`;
    }

    function messageText(message) {
      if (typeof message?.content === "string") return message.content;
      if (Array.isArray(message?.content)) {
        return message.content
          .map((part) => {
            if (typeof part === "string") return part;
            if (part && typeof part.text === "string") return part.text;
            return pretty(part);
          })
          .join("\n");
      }
      if (message?.tool_calls) {
        return message.tool_calls
          .map((call) => {
            const fn = call.function ?? call;
            return `${fn.name ?? "tool"}(${fn.arguments ?? ""})`;
          })
          .join("\n");
      }
      return pretty(message);
    }

    function renderChatMessage(message) {
      const role = message?.role ?? "unknown";
      const text = messageText(message);
      const body =
        role === "system"
          ? `<details><summary>Show system prompt (${esc(String(text).length)} chars)</summary><pre>${esc(text)}</pre></details>`
          : `<pre>${esc(text || "(empty)")}</pre>`;

      return `
        <div class="msg">
          <div class="msg-role ${esc(role)}">${esc(role)}</div>
          <div class="msg-body">${body}</div>
        </div>`;
    }

    function renderRequest(request) {
      const body = request?.body;
      if (body == null) {
        return `<p class="muted">No request body recorded — re-record this cassette.</p>`;
      }

      if (typeof body !== "object") {
        return `<pre>${esc(String(body))}</pre>`;
      }

      const messages = Array.isArray(body.messages) ? [...body.messages] : [];
      if (
        typeof body.system === "string" &&
        body.system.trim() &&
        !messages.some((message) => message?.role === "system")
      ) {
        messages.unshift({ role: "system", content: body.system });
      }
      const toolCount = Array.isArray(body.tools) ? body.tools.length : 0;

      return `
        <div class="meta">
          <span>model <b>${esc(body.model ?? "—")}</b></span>
          <span>${messages.length} message${messages.length === 1 ? "" : "s"}</span>
          <span>${toolCount} tool${toolCount === 1 ? "" : "s"}</span>
        </div>
        ${
          messages.length
            ? messages.map(renderChatMessage).join("")
            : `<p class="muted">No messages in request body.</p>`
        }
        <details>
          <summary>Raw request body</summary>
          <pre>${esc(pretty(body))}</pre>
        </details>`;
    }

    function exchangesFromCassette(cassette) {
      if (Array.isArray(cassette.exchanges) && cassette.exchanges.length) {
        return cassette.exchanges;
      }
      if (cassette.request && cassette.response) {
        return [{ request: cassette.request, response: cassette.response }];
      }
      return [];
    }

    function renderExchange(exchange, index, total) {
      const body = exchange?.response?.body;
      const choice = body?.choices?.[0];
      const message = choice?.message ?? {};
      const toolCalls = message.tool_calls ?? [];
      const content = message.content ?? "";
      const reasoning = message.reasoning_content ?? message.reasoning ?? "";
      const usage = body?.usage;

      return `
        <section>
          <h2>Turn ${index + 1}${total > 1 ? ` / ${total}` : ""}</h2>
          <div class="meta">
            <span>${esc(body?.model ?? "—")}</span>
            <span>${esc(choice?.finish_reason ?? "—")}</span>
            <span>${
              usage
                ? `${usage.prompt_tokens ?? "?"} in / ${usage.completion_tokens ?? "?"} out`
                : "—"
            }</span>
          </div>

          <h2>Request</h2>
          ${renderRequest(exchange?.request)}

          <h2>Response</h2>
          ${reasoning ? `<p class="muted">Reasoning</p><pre>${esc(reasoning)}</pre>` : ""}
          ${content ? `<pre>${esc(content)}</pre>` : `<p class="muted">(empty content)</p>`}
          <h2>Function calls (${toolCalls.length})</h2>
          ${
            toolCalls.length
              ? toolCalls.map(renderFunctionCall).join("")
              : `<p class="muted">None</p>`
          }
        </section>`;
    }

    function renderCassette(name, cassette) {
      const exchanges = exchangesFromCassette(cassette);
      const firstBody = exchanges[0]?.response?.body;

      viewEl.innerHTML = `
        <div class="meta">
          <span><b>${esc(cassette.name ?? name)}</b></span>
          <span>${exchanges.length} exchange${exchanges.length === 1 ? "" : "s"}</span>
          <span>${esc(firstBody?.model ?? "—")}</span>
          <span>${esc(cassette.recordedAt ?? "—")}</span>
        </div>

        ${
          exchanges.length
            ? exchanges.map((exchange, index) => renderExchange(exchange, index, exchanges.length)).join("")
            : `<p class="muted">No exchanges in cassette.</p>`
        }

        <h2>Raw cassette</h2>
        <details>
          <summary>Show JSON</summary>
          <pre>${esc(pretty(cassette))}</pre>
        </details>
      `;
    }

    function setActive(name) {
      if (!name || !cache.has(name)) return;
      selectEl.value = name;
      renderCassette(name, cache.get(name));
    }

    function upsertOption(name) {
      let option = [...selectEl.options].find((entry) => entry.value === name);
      if (!option) {
        option = document.createElement("option");
        option.value = name;
        option.textContent = name.replace(/\.json$/, "");
        selectEl.appendChild(option);
      }
    }

    async function loadFromUrl(name) {
      const res = await fetch(`./${name}`, { cache: "no-store" });
      if (!res.ok) throw new Error(`${name}: ${res.status}`);
      const data = await res.json();
      cache.set(name, data);
      upsertOption(name);
    }

    async function listCassetteNames() {
      const res = await fetch("./api/cassettes", { cache: "no-store" });
      if (!res.ok) throw new Error(`api/cassettes: ${res.status}`);
      const data = await res.json();
      const names = Array.isArray(data?.cassettes) ? data.cassettes : [];
      return names.filter((name) => typeof name === "string" && name.endsWith(".json"));
    }

    async function loadKnown() {
      statusEl.textContent = "Loading…";
      const previous = selectEl.value;
      selectEl.innerHTML = `<option value="">Select cassette…</option>`;
      const loaded = [];

      let names = [];
      try {
        names = await listCassetteNames();
      } catch {
        statusEl.innerHTML = `<span class="error">Could not list cassettes.</span> Run <code>bun run view:cassettes</code>`;
        viewEl.innerHTML = `<p class="empty">Serve this folder with <code>bun run view:cassettes</code>, or open/drop a .json file.</p>`;
        return;
      }

      for (const name of names) {
        try {
          await loadFromUrl(name);
          loaded.push(name);
        } catch {
          /* skip unreadable */
        }
      }

      if (loaded.length) {
        statusEl.textContent = `${loaded.length} loaded`;
        const preferred = loaded.includes(previous) ? previous : loaded[0];
        setActive(preferred);
      } else {
        statusEl.textContent = "No cassettes found";
        viewEl.innerHTML = `<p class="empty">No <code>*.json</code> cassettes in this folder yet.</p>`;
      }
    }

    function ingestFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const data = JSON.parse(String(reader.result));
            const name = file.name.endsWith(".json") ? file.name : `${file.name}.json`;
            cache.set(name, data);
            upsertOption(name);
            setActive(name);
            resolve(name);
          } catch (err) {
            reject(err);
          }
        };
        reader.onerror = () => reject(reader.error);
        reader.readAsText(file);
      });
    }

    selectEl.addEventListener("change", () => {
      if (selectEl.value) setActive(selectEl.value);
    });

    document.getElementById("file").addEventListener("change", async (event) => {
      for (const file of [...(event.target.files ?? [])]) {
        try {
          await ingestFile(file);
          statusEl.textContent = file.name;
        } catch (err) {
          statusEl.innerHTML = `<span class="error">${esc(err.message)}</span>`;
        }
      }
      event.target.value = "";
    });

    document.getElementById("reload").addEventListener("click", () => loadKnown());

    for (const eventName of ["dragenter", "dragover"]) {
      mainEl.addEventListener(eventName, (event) => {
        event.preventDefault();
        mainEl.classList.add("drag-over");
      });
    }

    mainEl.addEventListener("dragleave", (event) => {
      if (!mainEl.contains(event.relatedTarget)) {
        mainEl.classList.remove("drag-over");
      }
    });

    mainEl.addEventListener("drop", async (event) => {
      event.preventDefault();
      mainEl.classList.remove("drag-over");
      for (const file of [...(event.dataTransfer?.files ?? [])].filter((f) => f.name.endsWith(".json"))) {
        try {
          await ingestFile(file);
          statusEl.textContent = file.name;
        } catch {
          statusEl.innerHTML = `<span class="error">Failed: ${esc(file.name)}</span>`;
        }
      }
    });

    loadKnown();
  </script>
</body>
</html>
