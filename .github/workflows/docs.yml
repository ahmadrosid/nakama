name: Docs

on:
  push:
    branches: [main]
    paths: ['docs/website/**', '.github/workflows/docs.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment_retry.outputs.page_url || steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: docs/website

      - name: Build docs
        run: bun run build
        working-directory: docs/website
        env:
          NODE_ENV: production
          NAKAMA_DOCS_GITHUB_PAGES: 'true'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/website/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Retry Pages deploy
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v5

      - name: Verify Pages deploy
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: exit 1
